// --- PWA Setup ---------------------------------------------------------------
function setupPWA() {
  const iconUrl = LOGO_URL;

  // Set logos
  const logoImg = document.getElementById('setup-logo-img');
  if (logoImg) logoImg.src = iconUrl;
  const sidebarLogo = document.getElementById('sidebar-logo');
  if (sidebarLogo) sidebarLogo.src = iconUrl;

  // Set apple touch icon
  document.getElementById('apple-icon').href = iconUrl;

  // Build manifest dynamically
  const manifest = {
    name: 'AZS Intern',
    short_name: 'AZS Intern',
    description: 'Internes Kommunikations-Tool',
    start_url: location.href,
    display: 'standalone',
    background_color: '#f0f2f5',
    theme_color: '#f0f2f5',
    orientation: 'portrait-primary',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/png' },
      { src: iconUrl, sizes: '512x512', type: 'image/png' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

  // Register service worker — auto-reload on update
  if ('serviceWorker' in navigator && location.protocol === 'https:' && !location.hostname.includes('claudeusercontent')) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('SW registered');
      // New SW waiting → skip waiting → reload all clients
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // New version ready — reload page automatically
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }).catch(e => console.log('SW skip:', e.message));

    // When SW activates new version, reload the page
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) { refreshing = true; window.location.reload(); }
    });
  }
}

// --- Key management ----------------------------------------------------------
function forgetKey() {
  localStorage.removeItem('tc_apikey');
  // Reset setup screen to show key field again
  document.getElementById('key-section').style.display = 'block';
  document.getElementById('inp-key').style.display = '';
  document.querySelector('#key-section .setup-hint').style.display = '';
  document.querySelector('#key-section label').style.display = '';
  document.getElementById('forget-key-wrap').style.display = 'none';
  document.querySelector('.setup-sub').textContent = 'Internes Kommunikations-Tool';
  toast('API Key gelöscht');
}

// --- Init ---------------------------------------------------------------------
window.onload=()=>{
  document.addEventListener('click', ()=>{ if(!audioCtx) initAudio(); }, {once:true});
  // Close panel on click outside (with small delay so tab click registers first)
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('task-panel');
    const tab   = document.getElementById('sidebar-tab-new');
    const tabsCol = document.querySelector('.sidebar-tabs-col');
    if (panel && panel.classList.contains('open')) {
      if (!panel.contains(e.target) && !tabsCol?.contains(e.target)) {
        closeTaskModal();
      }
    }
  });
  setupPWA();
  // Clean messages older than 24h every 10 minutes
  setInterval(()=>{
    const cutoff = Date.now() - 24*60*60*1000;
    Object.keys(messages).forEach(room => {
      messages[room] = (messages[room]||[]).filter(m => new Date(m.ts).getTime() > cutoff);
    });
    renderMessages();
  }, 10*60*1000);
  // Restore key from localStorage
  const savedKey = ABLY_KEY || localStorage.getItem('tc_apikey') || '';
  if (savedKey) {
    // Key known — hide key field, show only name
    document.getElementById('key-section').style.display = 'none';
    document.querySelector('.setup-sub').textContent = 'Einfach Namen eingeben und loslegen';
    // Show "forget key" option if it came from localStorage
    if (!ABLY_KEY && localStorage.getItem('tc_apikey')) {
      document.getElementById('key-section').style.display = 'block';
      document.getElementById('inp-key').style.display = 'none';
      document.querySelector('#key-section .setup-hint').style.display = 'none';
      document.querySelector('#key-section label').style.display = 'none';
      document.getElementById('forget-key-wrap').style.display = 'block';
    }
  }
  // Restore saved name
  try{ const s=JSON.parse(localStorage.getItem('tc_me')||'{}'); if(s.name) document.getElementById('inp-name').value=s.name; }catch(e){}
  // Auto-focus name field
  setTimeout(()=>document.getElementById('inp-name').focus(), 100);
};
